name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version leída de packageManager en package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (OpenNext → Cloudflare Workers)
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ github.ref == 'refs/heads/main' && 'https://pixlit.site' || 'https://pixlit-preview.workers.dev' }}
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      # ── Producción (push a main) ──────────────────────────────────────────
      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: pnpm exec wrangler deploy --config wrangler.jsonc --name pixlit

      - name: Upload Worker secrets
        if: github.ref == 'refs/heads/main'
        run: |
          put_secret() {
            local KEY="$1" VAL="$2"
            if [ -n "$VAL" ]; then
              printf '%s' "$VAL" | pnpm exec wrangler secret put "$KEY" --name pixlit
            else
              echo "⚠️  Skipping $KEY (empty)"
            fi
          }
          put_secret NEXT_PUBLIC_SUPABASE_URL           "$NEXT_PUBLIC_SUPABASE_URL"
          put_secret NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          put_secret SUPABASE_SERVICE_ROLE_KEY          "$SUPABASE_SERVICE_ROLE_KEY"
          put_secret NEXT_PUBLIC_APP_URL                "https://pixlit.site"
          put_secret PP_CLIID                           "$PP_CLIID"
          put_secret PP_SCRT                            "$PP_SCRT"
          put_secret NEXT_PUBLIC_PAYPAL_CLIENT_ID       "$NEXT_PUBLIC_PAYPAL_CLIENT_ID"
          put_secret PAYPAL_PLAN_STARTER                "$PAYPAL_PLAN_STARTER"
          put_secret PAYPAL_MODE                        "live"
          put_secret PAYPAL_WEBHOOK_ID                  "$PAYPAL_WEBHOOK_ID"
        env:
          NEXT_PUBLIC_SUPABASE_URL:            ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:           ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PP_CLIID:                            ${{ secrets.PP_CLIID }}
          PP_SCRT:                             ${{ secrets.PP_SCRT }}
          NEXT_PUBLIC_PAYPAL_CLIENT_ID:        ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          PAYPAL_PLAN_STARTER:                 ${{ secrets.PAYPAL_PLAN_STARTER }}
          PAYPAL_WEBHOOK_ID:                   ${{ secrets.PAYPAL_WEBHOOK_ID }}

      # ── Preview (PR) ──────────────────────────────────────────────────────
      - name: Deploy preview (PR)
        if: github.event_name == 'pull_request'
        run: pnpm exec wrangler deploy --config wrangler.jsonc --name pixlit-pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.issue.number;
            const workerName = `pixlit-pr-${prNum}`;
            const previewUrl = `https://${workerName}.workers.dev`;
            const body = [
              '## 🚀 Preview desplegado en Cloudflare Workers',
              '',
              `**URL:** ${previewUrl}`,
              '',
              `**Commit:** \`${{ github.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              '_Este worker de preview se elimina cuando el PR se cierra._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview desplegado')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
